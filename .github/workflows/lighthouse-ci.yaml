name: Lighthouse CI
on: push

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@12.6.2
        with:
          urls: |
            https://clarence.tw
            https://clarencetw.github.io
            https://clarencetw.netlify.app/
