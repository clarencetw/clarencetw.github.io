name: Lighthouse CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Audit the generated site
        uses: treosh/lighthouse-ci-action@12.6.2
        with:
          configPath: ./.github/lighthouse/lighthouserc.json
          uploadArtifacts: true
