name: "Theme Update"

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-theme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.2.1
        with:
          hugo-version: "0.164.0"
          extended: true

      - name: Update Hugo module and generated npm metadata
        run: npm run theme:update

      - name: Apply npm security fixes
        run: npm audit fix

      - name: Audit dependencies
        run: npm run audit

      - name: Build
        run: |
          # build the site
          npm run build
          # remove file generated by the build
          rm -rf public/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          base: master
          commit-message: "chore(deps): update Toha theme"
          title: "chore(deps): update Toha theme"
          labels: automerge
          branch: dependencies/update-theme
