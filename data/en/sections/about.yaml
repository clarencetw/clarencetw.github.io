# a summary about you
summary: |-
  I work across backend development, DevOps, Linux, cloud architecture, and infrastructure security, treating backend, AI applications, cloud, on-prem infrastructure, networking, and security as one delivery chain. My work goes beyond feature completion: services need to be reliably deployed, observable, and maintainable.

  My experience at BRONCI Technology Inc. includes backend services and APIs, GitLab CI/CD, GitHub Actions, AWS CDK / IaC, automated testing with Jest, and cloud platforms across AWS, GCP, and Azure. My AI work includes Kaldi, Whisper, OpenAI APIs, Ollama, LLM applications, and GPU runtimes.

  My infrastructure work covers cloud and on-prem platforms, Proxmox VE and Proxmox Backup Server (PBS), Harbor, LibreNMS, LDAP, enterprise wired and Wi-Fi networks, VPN / SD-WAN, and equipment selection and infrastructure procurement planning.

  I am also the author of [AWS CDK 完全學習手冊](#publications), and I turn engineering problems, solutions, and practical experience into technical articles, notes, and open-source projects.

