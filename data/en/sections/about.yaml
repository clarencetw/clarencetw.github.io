# a summary about you
summary: "I work across backend systems, AI applications, DevOps, self-hosted infrastructure, and enterprise networking as one delivery chain. My focus is getting services online, observable, secure, and maintainable, then integrating LLMs, speech recognition, GPU runtimes, cloud platforms, and on-prem systems when the product needs them. At BRONCI Technology Inc., I work on APIs and backend services, CI/CD, AWS CDK/IaC, Kaldi, Whisper, OpenAI/Ollama applications, Proxmox, Harbor, LibreNMS, LDAP, office wired/wireless networks, and infrastructure procurement planning. I am also the author of [AWS CDK 完全學習手冊](https://www.tenlong.com.tw/products/9789864349203), and I publish technical notes and open-source work around cloud, DevOps, Linux, networking, and AI development."

