intro: |-
  I earned every certification and credential listed below by completing the required assessments. Each entry explains the practical knowledge and skills demonstrated, showing the breadth of my technical foundation.

groups:
  - name: Professional & Digital Skills
    description: Credentials I earned across national technical skills, network security, digital literacy, and applied IT, organized by the capabilities they demonstrate.
    layout: two
    accomplishments:
      - name: National Technician Certificates｜Systems & Networking
        displayName: National Technician｜Hardware & Networking
        credentialTag: Hardware & Networking
        organization:
          name: Workforce Development Agency, Ministry of Labor
          url: "https://www.wdasec.gov.tw/"
        courseOverview: |-
          Passed Taiwan's **Computer Hardware Maintenance Class B, Computer Hardware Maintenance Class C, and Network Installation Class C** skill tests. Demonstrates hands-on ability in PC and peripheral diagnostics and repair, hardware assembly, system installation, network cabling, and network-component setup.
        references:
          - label: Hardware standard
            url: "https://ws.wda.gov.tw/Download.ashx?n=MTIwMDDpm7vohabnoazpq5Too53kv64xMDIuMDQwOC5wZGY%3D&u=LzAwMS9VcGxvYWQvMzE1L1JlbEZpbGUvMTAyMzkvOTkwMzMvMjAxOTA1MzAxNDM3MzkwLjA0MDgucGRm"
