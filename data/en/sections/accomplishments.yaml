  - name: Microsoft Office 2007 Master
    description: Passed all four MCAS exams - Word, Excel, PowerPoint, and Outlook - and earned the Microsoft Office 2007 Master credential. Together they demonstrate end-to-end Office proficiency across documents, data, presentations, email, and scheduling.
    layout: two
    references:
      - label: Official Master credential FAQ
        url: "https://www.certiport.com/Portal/common/documentlibrary/MCAS_Master_FAQ.pdf"
    accomplishments:
      - name: "MCAS: Using Microsoft Office Word 2007 (77-601)"
        displayName: Word 2007
        credentialName: Microsoft Certified Application Specialist
        credentialCode: 77-601
        credentialTag: Word Processing
        organization:
          name: Microsoft / Certiport
          url: "https://www.certiport.com/Portal/common/documentlibrary/MCAS_Master_FAQ.pdf"
        courseOverview: Passed exam 77-601 and earned the Word 2007 credential. Demonstrates document creation, editing, formatting, page layout, and publication-ready output.

      - name: "MCAS: Using Microsoft Office Excel 2007 (77-602)"
        displayName: Excel 2007
        credentialName: Microsoft Certified Application Specialist
        credentialCode: 77-602
        credentialTag: Spreadsheets & Data Analysis
        organization:
          name: Microsoft / Certiport
          url: "https://www.certiport.com/Portal/common/documentlibrary/MCAS_Master_FAQ.pdf"
        courseOverview: Passed exam 77-602 and earned the Excel 2007 credential. Demonstrates worksheet design, formulas and functions, data organization, and charting.

      - name: "MCAS: Using Microsoft Office PowerPoint 2007 (77-603)"
        displayName: PowerPoint 2007
        credentialName: Microsoft Certified Application Specialist
        credentialCode: 77-603
        credentialTag: Presentation Design
        organization:
          name: Microsoft / Certiport
          url: "https://www.certiport.com/Portal/common/documentlibrary/MCAS_Master_FAQ.pdf"
        courseOverview: Passed exam 77-603 and earned the PowerPoint 2007 credential. Demonstrates presentation structure, visual design, animation, and delivery-ready output.

      - name: "MCAS: Using Microsoft Office Outlook 2007 (77-604)"
        displayName: Outlook 2007
        credentialName: Microsoft Certified Application Specialist
        credentialCode: 77-604
        credentialTag: Email & Scheduling
        organization:
          name: Microsoft / Certiport
          url: "https://www.certiport.com/Portal/common/documentlibrary/MCAS_Master_FAQ.pdf"
        courseOverview: Passed exam 77-604 and earned the Outlook 2007 credential. Demonstrates integrated management of email, contacts, calendars, meetings, and tasks.

