      - name: Fortinet NSE 1 / NSE 2 Network Security Associate
        displayName: Fortinet NSE 1 + NSE 2
        credentialName: Network Security Associate
        credentialTag: Network Security
        organization:
          name: Fortinet Training Institute
          url: "https://www.fortinet.com/training-certification"
        courseOverview: |-
          Completed and passed the **NSE 1** and **NSE 2** assessments, earning both credentials. Demonstrates foundational knowledge of cyberthreats, safe online behavior, major security-product categories, and the role of Fortinet solutions.
        references:
          - label: Official program guide
            url: "https://www.fortinet.com/content/dam/fortinet/assets/training/NSE-End-User-Guide.pdf"
          - label: Fortinet Training
            url: "https://www.fortinet.com/training-certification"

