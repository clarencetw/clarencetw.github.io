    company:
      name: BRONCI Technology Inc.
      url: "https://bronci.com.tw/"
      location: Taipei
      overview: Cloud software development, cloud architecture, and system automation deployment, covering various advanced technologies applied across multiple business areas.
    positions:
      - designation: Senior Backend Developer / LLM Engineer
        start: 11 2020
        featuredResponsibilities:
          - "Design and build backend services, APIs, background jobs, and third-party integrations."
          - "Bring LLM, OpenAI / Ollama, Kaldi / Whisper, and GPU runtimes into maintainable workflows."
          - "Build repeatable cloud architecture with AWS CDK and infrastructure as code."
          - "Maintain GitLab CI/CD, GitHub Actions, automated tests, and container delivery."
          - "Operate Linux, Proxmox VE / PBS, Harbor, monitoring, and on-prem infrastructure."
          - "Plan enterprise networks across VLAN, VPN, firewalls, Wi-Fi, and SD-WAN."
        responsibilities:
          - "Build backend services, APIs, background jobs, and internal tools with Node.js, Python, Go, C/C++, Shell Script, Java, PostgreSQL, MySQL, and Docker."
          - "Design APIs, background jobs, data processing flows, and third-party service integrations."
          - "Integrate Japanese home camera cloud services for remote monitoring and device-management scenarios."
          - "Develop Japanese IoT smart-home voice command services."
          - "Develop Taiwan home-appliance voice-control solutions across devices, cloud services, and voice workflows."
          - "Maintain Jest automated tests and regression checks so backend releases remain repeatable."
          - "Work on LLM applications, tool calling, agent workflows, and production integration since 2022."
          - "Integrate OpenAI API, Ollama, and internal AI workflows for product and operations use cases."
          - "Integrate Kaldi and Whisper speech recognition for ASR, transcription, and model deployment."
          - "Operate NVIDIA GPU servers, drivers, runtimes, inference environments, and system tuning."
          - "Design AWS architecture across availability, scalability, networking, and deployment paths."
          - "Use AWS CDK and Infrastructure as Code to manage repeatable cloud resources."
          - "Connect AWS, GCP, Azure, and on-prem services so cloud and self-hosted systems work together."
          - "Maintain GitLab CI/CD, GitHub Actions, container image builds, and deployment workflows."
          - "Manage on-prem, cloud, and physical data-center environments, including hardware maintenance and capacity planning."
          - "Design and operate Proxmox VE clusters, virtualization, storage, and VM lifecycle."
          - "Deploy Proxmox Backup Server for backup, restore, and disaster recovery workflows."
          - "Deploy and maintain Harbor private registry, GitLab, LDAP, and related internal platforms."
          - "Plan office and enterprise wired networks, VLANs, routing, firewall policy, and switching."
          - "Manage SD-WAN distributed networks for cross-site connectivity, performance, and security."
          - "Deploy Aruba and UniFi Wi-Fi for office wireless coverage, roaming, and operations."
          - "Use LibreNMS for network/server monitoring, alerting, and issue detection."
          - "Plan internal and external data-center paths for site-to-site backup and high availability."
          - "Evaluate Dell, HP, Supermicro server hardware and GPU server specifications."
          - "Evaluate network equipment such as switches, firewalls, and wireless APs."
          - "Compare vendor quotes and turn technical requirements into maintainable purchase specifications."

