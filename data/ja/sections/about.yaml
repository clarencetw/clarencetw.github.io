summary: "Backend、AI Application、DevOps、Infrastructure を中心に、API、CI/CD、Cloud、On-prem、Network、Security をひとつの delivery chain として扱っています。単に機能を作るだけではなく、サービスを安定して公開し、観測でき、運用できる状態にすることを重視しています。必要に応じて LLM、Speech AI、GPU Runtime、Cloud Services、自社運用の infrastructure を実際のプロダクトに統合します。現在は長問科技で Senior Backend Developer / LLM Engineer として、Backend service、API、GitLab CI/CD、GitHub Actions、AWS CDK / IaC、Kaldi、Whisper、OpenAI / Ollama、Proxmox VE、Harbor、LibreNMS、LDAP、Enterprise Wi-Fi / SD-WAN、機材選定を担当しています。[AWS CDK 完全學習手冊](https://www.tenlong.com.tw/products/9789864349203) の著者でもあり、Cloud、DevOps、Linux、Network、AI 開発の経験を記事や Open Source として整理しています。"

