summary: |-
  バックエンド開発、DevOps、Linux、クラウドアーキテクチャ、システムセキュリティに長く取り組み、バックエンド、AIアプリケーション、クラウド、オンプレミス、ネットワーク、セキュリティを一つのデリバリーチェーンとして捉えています。機能実装にとどまらず、サービスの安定した本番公開、可観測性、継続運用までを重視します。

  現在、長問科技で Senior Backend Developer / LLM Engineer を務めています。同社での実務経験には、バックエンドサービスとAPI、GitLab CI/CD、GitHub Actions、AWS CDK / IaC、Jestによる自動テスト、AWS・GCP・Azureを利用したクラウド連携が含まれます。AI分野ではKaldi、Whisper、OpenAI API、Ollama、LLMアプリケーション、GPUランタイムに取り組んでいます。

  インフラ領域では、クラウド／オンプレミス基盤、Proxmox VE／Proxmox Backup Server（PBS）、Harbor、LibreNMS、LDAP、企業向け有線／Wi-Fiネットワーク、VPN／SD-WAN、機器選定とインフラ調達計画を扱っています。

  [AWS CDK 完全學習手冊](#publications) の著者でもあり、開発で直面した問題、解決方法、実務経験を技術記事、ノート、オープンソースプロジェクトとして公開しています。

