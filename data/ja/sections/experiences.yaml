          - "Backend service、API、background job、third-party integration を設計・開発。"
          - "LLM、OpenAI / Ollama、Kaldi / Whisper、GPU runtime を運用可能な workflow へ統合。"
          - "AWS CDK / IaC で再現可能な Cloud architecture を構築。"
          - "GitLab CI/CD、GitHub Actions、automated tests、container delivery を運用。"
