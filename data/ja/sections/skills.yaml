  - name: Redis
    logo: /images/sections/skills/brands/redis.svg
    summary: "In-memory cache / data store として、Application performance、Session management、高速データアクセスを支援します。"
    url: "https://redis.io/"
    categories: ["database"]

  - name: Linux
    summary: "Server installation、network configuration、CLI operations、Shell Script automation を扱います。"
    url: "https://blog.clarence.tw/category/os/ubuntu/"
