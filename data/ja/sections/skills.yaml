  - name: GPU Computing
    logo: /images/sections/skills/brands/nvidia.svg
    summary: "NVIDIA GPU server、CUDA runtime、driver environment を運用し、AI inference / training workload を支援します。"
    url: "https://blog.clarence.tw/category/nvidia/"
