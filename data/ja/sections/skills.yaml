    url: "https://blog.clarence.tw/category/proxmox-ve/"
    categories: ["others"]

  - name: Network Management
    featured: true
    summary: "Enterprise network operations。Switch、Firewall、Wi-Fi、VLAN、VPN、SD-WAN、QoS、STP/RSTP を扱います。"
    url: "https://blog.clarence.tw/category/network/"
    categories: ["network"]

  - name: Network Security
    summary: "Firewall rules、IPS / IDS、OpenVPN・L2TP、SSL / TLS、基本的な security control を含む Network Security operations を行います。"
