skills:
  - name: AWS
    summary: "EC2、RDS、Lambda、Route 53、ECS、ALB、VPC、CloudFormation、WAF、S3、CloudFront など AWS Cloud Services を実運用で利用しています。"
    url: "https://aws.amazon.com/"
    categories: ["cloud"]

  - name: AWS CDK
    featured: true
    summary: "Infrastructure as Code (IaC) の実務経験があり、[AWS CDK 完全學習手冊](#publications) の著者です。TypeScript / Python で Cloud infrastructure を管理します。"
    url: "https://aws.amazon.com/cdk/"
    categories: ["cloud", "devops"]

  - name: GCP
    logo: /images/sections/skills/brands/googlecloud.svg
    summary: "Google Cloud Platform の VM、CDN、Load Balancer、MySQL などを利用して Cloud Architecture を構築します。"
    url: "https://cloud.google.com/"
    categories: ["cloud"]

  - name: Azure
    summary: "Azure Virtual Machines を利用した Cloud Architecture の構築経験があります。"
    url: "https://azure.microsoft.com/"
    categories: ["cloud"]

  - name: Cloud Architecture
    summary: "AWS・GCP・Azure を中心に再現可能な Cloud Architecture を設計・運用し、IaC、Network、Load Balancing、可用性、Security を扱います。"
    categories: ["cloud", "devops"]

  - name: Node.js
    featured: true
    logo: /images/sections/skills/brands/nodedotjs.svg
    summary: "Backend 開発の主要言語として、Server-side application、API service、Web application を開発しています。"
    url: "https://blog.clarence.tw/category/programming-language/node-js/"
    categories: ["language"]

  - name: Python
    featured: true
    logo: /images/sections/skills/brands/python.svg
    summary: "LLM application、automation script、data processing、AI 関連開発で利用しています。"
    url: "https://www.python.org/"
    categories: ["language", "ai"]

  - name: Go
    logo: /images/sections/skills/brands/go.svg
    summary: "Network application、server software、microservices の開発で利用しています。"
    url: "https://go.dev/"
    categories: ["language"]

  - name: PHP
    logo: /images/sections/skills/brands/php.svg
    summary: "PHP を利用して API、Admin backend、Web application を開発し、既存システムとの連携や動的コンテンツを扱います。"
    url: "https://www.php.net/"
    categories: ["language"]

  - name: LINE Platform
    logo: /images/sections/skills/brands/line.svg
    summary: "LINE Messaging API、LINE Bot、webhook workflow を PHP / Node.js backend application と連携します。LINE Notify は過去の統合経験としてのみ記載しています（2025年3月31日にサービス終了）。"
    url: "https://blog.clarence.tw/category/line/"
    categories: ["language"]

