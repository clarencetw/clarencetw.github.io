# a summary about you
summary: |-
  我長期投入網站後端開發、DevOps、Linux、Cloud Architecture 與系統安全，並把 Backend、AI Application、DevOps、Cloud、On-prem、Network 與 Security 放在同一條交付鏈上處理。我的工作不只是在完成功能，也包括讓服務能穩定上線、可觀測、可維運。

  現在於長問科技擔任 Senior Backend Developer / LLM Engineer。實務經驗涵蓋 Backend service 與 API、GitLab CI/CD、GitHub Actions、AWS CDK / IaC、Jest 自動化測試，以及 AWS、GCP、Azure 等 Cloud platform；AI 工作包含 Kaldi、Whisper、OpenAI / Ollama、LLM Application 與 GPU Runtime。

  Infrastructure 經驗涵蓋 Cloud 與 On-prem platform、Proxmox VE / PBS、Harbor、LibreNMS、LDAP、Enterprise wired / Wi-Fi network、VPN / SD-WAN，以及設備選型與基礎設施採購規劃。

  我也是 [AWS CDK 完全學習手冊](#publications) 作者，持續把開發過程中遇到的問題、解決方法與實務經驗整理成技術文章、筆記及 Open Source 專案。

