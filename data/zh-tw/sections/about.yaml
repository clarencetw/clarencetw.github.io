# a summary about you
summary: "我主要做 Backend、AI Application、DevOps 與 Infrastructure，把 API、CI/CD、Cloud、On-prem、Network 與 Security 放在同一條交付鏈上處理。我的工作重點不是只把功能寫完，而是讓服務能穩定上線、可觀測、可維運，並在產品需要時整合 LLM、Speech AI、GPU Runtime、Cloud Services 與自建機房資源。目前在長問科技擔任 Senior Backend Developer / LLM Engineer，負責 Backend service、API、GitLab CI/CD、GitHub Actions、AWS CDK / IaC、Kaldi、Whisper、OpenAI / Ollama，以及 Proxmox VE、Harbor、LibreNMS、LDAP、Enterprise Wi-Fi / SD-WAN 與設備採購規劃。我也是 [AWS CDK 完全學習手冊](https://www.tenlong.com.tw/products/9789864349203) 作者，持續把 Cloud、DevOps、Linux、Network 與 AI 開發經驗整理成文章與 Open Source 專案。"

