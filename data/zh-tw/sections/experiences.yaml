          - "管理 SD-WAN distributed network，支援跨站點連線、效能與安全需求。"
          - "建置 Aruba、UniFi Wi-Fi，處理 office wireless coverage、roaming 與維運。"
          - "使用 LibreNMS 進行 network / server monitoring、alerting 與問題偵測。"
          - "規劃內外部機房、site-to-site backup 與 high availability 路徑。"
          - "評估 Dell、HP、Supermicro server hardware 與 GPU server 規格。"
          - "評估 switch、firewall、wireless AP 等 network equipment。"
          - "整理 vendor quote、solution comparison 與可採購、可維運的技術規格。"

